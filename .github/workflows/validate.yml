name: Validate Cards

on:
  push:
  pull_request:

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Parse JSON schema
        run: python3 -m json.tool cards/open_world_evaluation_card.schema.json > /dev/null

      - name: Validate all card YAML files
        run: make validate-all

      - name: Run card quality linter
        run: make lint-cards

      - name: Score reference card
        run: make score

      - name: Verify rendered cards are current
        run: |
          make render-cards
          git diff --exit-code -- cards/rendered

      - name: Check local Markdown links
        run: make check-links

      - name: Check curated resource entries
        run: make check-awesome

      - name: Run validator tests
        run: make test
